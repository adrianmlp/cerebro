<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerebro — Notes</title>
  <meta name="worker-url" content="https://cerebro-worker.mlpdev.workers.dev" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="app-nav">
  <a class="nav-logo" href="index.html">Cerebro</a>
  <span class="nav-date" id="nav-date"></span>
  <ul class="nav-links">
    <li><a href="index.html"    data-page="dashboard">Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks">Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar">Calendar</a></li>
    <li><a href="notes.html"   data-page="notes">Notes</a></li>
  </ul>
  <button id="mobile-menu-btn">☰</button>
</nav>

<main class="page-content notes-page-layout">
  <div class="notes-split" id="notes-split">

    <!-- Left sidebar -->
    <div class="notes-sidebar">
      <div class="notes-sidebar-header">
        <div class="notes-sidebar-title">
          <span>📝</span> Notes
          <span class="notes-count" id="notes-count"></span>
        </div>
        <button class="btn btn-primary btn-sm" id="new-note-btn">+ New Note</button>
      </div>
      <div class="notes-sidebar-search">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="input" id="search-input" placeholder="Search notes…" />
        </div>
      </div>
      <div id="tag-filter-row" style="display:none">
        <div class="filter-pills" id="tag-filter-pills"></div>
      </div>
      <div class="notes-list" id="notes-list">
        <div style="padding:24px;text-align:center"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Right editor panel -->
    <div class="notes-panel" id="notes-panel">
      <div class="notes-panel-empty" id="notes-panel-empty">
        <div class="empty-icon">📝</div>
        <div class="empty-text">Select a note or create a new one</div>
      </div>

      <div class="notes-editor" id="notes-editor" style="display:none">
        <div class="notes-editor-header">
          <button class="btn btn-ghost btn-sm notes-mobile-back" id="back-btn">← Back</button>
          <span class="note-save-indicator" id="save-indicator"></span>
          <button class="btn btn-ghost btn-sm" id="save-note-btn">Save</button>
          <button class="btn-icon danger" id="delete-note-btn" title="Delete note">🗑</button>
        </div>
        <input class="note-editor-title" id="note-title" placeholder="Note title…" />
        <div class="note-toolbar">
          <button class="note-toolbar-btn" id="fmt-bold" title="Bold"><strong>B</strong></button>
          <div class="note-toolbar-divider"></div>
          <button class="note-toolbar-btn" id="fmt-bullet" title="Bullet list">• List</button>
        </div>
        <textarea class="note-editor-content" id="note-content" placeholder="Start writing…"></textarea>
        <div class="note-tags-section">
          <div class="note-tags-chips" id="note-tags-chips"></div>
          <input class="note-tag-input" id="note-tag-input" placeholder="Add tag… (press Enter or comma)" />
        </div>
      </div>
    </div>

  </div>
</main>

<nav id="mobile-bottom-nav">
  <ul>
    <li><a href="index.html"    data-page="dashboard"><span class="mobile-nav-icon">⊞</span>Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks"><span class="mobile-nav-icon">☑</span>Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar"><span class="mobile-nav-icon">📅</span>Calendar</a></li>
    <li><a href="notes.html"   data-page="notes"><span class="mobile-nav-icon">📝</span>Notes</a></li>
  </ul>
</nav>

<div id="toast-container"></div>
<script type="module" src="notes.js"></script>
</body>
</html>
