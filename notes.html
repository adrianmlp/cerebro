<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerebro — Notes</title>
  <meta name="worker-url" content="https://cerebro-worker.mlpdev.workers.dev" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="app-nav">
  <a class="nav-logo" href="index.html">Cerebro</a>
  <span class="nav-date" id="nav-date"></span>
  <ul class="nav-links">
    <li><a href="index.html"    data-page="dashboard">Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks">Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar">Calendar</a></li>
    <li><a href="notes.html"   data-page="notes">Notes</a></li>
  </ul>
  <button id="mobile-menu-btn">☰</button>
</nav>

<main class="page-content">

  <!-- Grid view -->
  <div id="grid-view">
    <div class="page-header">
      <div class="page-title"><div class="page-title-icon">📝</div>Notes</div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" id="new-note-btn">+ New Note</button>
      </div>
    </div>

    <div class="search-wrap" style="margin-bottom:12px">
      <span class="search-icon">⌕</span>
      <input class="input" id="search-input" placeholder="Search notes…" />
    </div>

    <!-- Tag filter pills (shown only when tags exist) -->
    <div id="tag-filter-row" style="margin-bottom:16px;display:none">
      <div class="filter-pills" id="tag-filter-pills"></div>
    </div>

    <div class="notes-grid" id="notes-grid">
      <div class="empty-state" style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Editor view -->
  <div id="editor-view" style="display:none">
    <div class="page-header">
      <button class="btn btn-ghost btn-sm" id="back-btn">← Back</button>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span class="note-save-indicator" id="save-indicator"></span>
        <button class="btn btn-primary btn-sm" id="save-note-btn">Save</button>
      </div>
      <button class="btn-icon danger" id="delete-note-btn" title="Delete note" style="margin-left:4px">🗑</button>
    </div>

    <input class="note-editor-title" id="note-title" placeholder="Note title…" />

    <!-- Formatting toolbar -->
    <div class="note-toolbar">
      <button class="note-toolbar-btn" id="fmt-bold" title="Bold (wraps selection in **)"><strong>B</strong></button>
      <div class="note-toolbar-divider"></div>
      <button class="note-toolbar-btn" id="fmt-bullet" title="Bullet list (prefixes lines with •)">• List</button>
    </div>

    <textarea class="note-editor-content" id="note-content" placeholder="Start writing…"></textarea>

    <!-- Tags section -->
    <div class="note-tags-section">
      <div class="note-tags-chips" id="note-tags-chips"></div>
      <input class="note-tag-input" id="note-tag-input" placeholder="Add tag… (press Enter or comma)" />
    </div>
  </div>

</main>

<nav id="mobile-bottom-nav">
  <ul>
    <li><a href="index.html"    data-page="dashboard"><span class="mobile-nav-icon">⊞</span>Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks"><span class="mobile-nav-icon">☑</span>Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar"><span class="mobile-nav-icon">📅</span>Calendar</a></li>
    <li><a href="notes.html"   data-page="notes"><span class="mobile-nav-icon">📝</span>Notes</a></li>
  </ul>
</nav>

<div id="toast-container"></div>
<script type="module" src="notes.js"></script>
</body>
</html>
