<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerebro — Tasks</title>
  <meta name="worker-url" content="https://cerebro-worker.mlpdev.workers.dev" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>

<nav id="app-nav">
  <a class="nav-logo" href="index.html">Cerebro</a>
  <span class="nav-date" id="nav-date"></span>
  <ul class="nav-links">
    <li><a href="index.html"    data-page="dashboard">Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks">Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar">Calendar</a></li>
    <li><a href="notes.html"   data-page="notes">Notes</a></li>
    <li><a href="saves.html"    data-page="saves">Saves</a></li>
    <li><a href="settings.html" data-page="settings">Settings</a></li>
  </ul>
  <button id="mobile-menu-btn">☰</button>
</nav>

<main class="page-content">

  <div class="page-header">
    <div class="page-title">
      <div class="page-title-icon">☑</div>
      Tasks
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" id="add-task-btn">+ Add Task</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-body" style="padding:12px 20px">
      <span id="task-count" style="font-size:13px;color:var(--text-2)">Loading…</span>
    </div>
  </div>

  <!-- Controls -->
  <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <div class="search-wrap" style="flex:1;min-width:180px">
      <span class="search-icon">⌕</span>
      <input class="input" id="search-input" placeholder="Search tasks…" />
    </div>
    <div class="filter-pills" id="source-filters">
      <button class="filter-pill active" data-source="">All</button>
      <button class="filter-pill" data-source="personal">Personal</button>
      <button class="filter-pill" data-source="work">Work</button>
    </div>
    <button class="btn btn-ghost btn-sm" id="toggle-completed-btn">Hide Completed</button>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap">
    <div class="filter-pills" id="priority-filters">
      <button class="filter-pill active" data-priority="">All Priorities</button>
      <button class="filter-pill" data-priority="URGENT">🔴 Urgent</button>
      <button class="filter-pill" data-priority="HIGH">🟠 High</button>
      <button class="filter-pill" data-priority="NORMAL">🔵 Normal</button>
      <button class="filter-pill" data-priority="BACKLOG">⚫ Backlog</button>
    </div>
  </div>

  <!-- Task list -->
  <div class="card">
    <div class="card-body" id="task-list-body">
      <div class="empty-state"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<!-- Add/Edit Task Modal -->
<div class="modal-backdrop" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Task</div>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id" />
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="input" id="task-title" placeholder="What needs to be done?" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="textarea" id="task-desc" placeholder="Optional details…" rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="select" id="task-priority">
            <option value="URGENT">🔴 Urgent</option>
            <option value="HIGH">🟠 High</option>
            <option value="NORMAL" selected>🔵 Normal</option>
            <option value="BACKLOG">⚫ Backlog</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input class="input" type="date" id="task-due" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Add Task</button>
    </div>
  </div>
</div>

<nav id="mobile-bottom-nav">
  <ul>
    <li><a href="index.html"    data-page="dashboard"><span class="mobile-nav-icon">⊞</span>Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks"><span class="mobile-nav-icon">☑</span>Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar"><span class="mobile-nav-icon">📅</span>Calendar</a></li>
    <li><a href="notes.html"   data-page="notes"><span class="mobile-nav-icon">📝</span>Notes</a></li>
    <li><a href="saves.html"    data-page="saves"><span class="mobile-nav-icon">🔖</span>Saves</a></li>
    <li><a href="settings.html" data-page="settings"><span class="mobile-nav-icon">⚙</span>Settings</a></li>
  </ul>
</nav>

<div id="toast-container"></div>
<script type="module" src="tasks.js"></script>
</body>
</html>
