<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerebro — Calendar</title>
  <meta name="worker-url" content="https://cerebro-worker.mlpdev.workers.dev" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav id="app-nav">
  <a class="nav-logo" href="index.html">Cerebro</a>
  <span class="nav-date" id="nav-date"></span>
  <ul class="nav-links">
    <li><a href="index.html"    data-page="dashboard">Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks">Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar">Calendar</a></li>
    <li><a href="notes.html"   data-page="notes">Notes</a></li>
  </ul>
  <button id="mobile-menu-btn">☰</button>
</nav>

<main class="page-content">

  <div class="page-header">
    <div class="page-title"><div class="page-title-icon">📅</div>Calendar</div>
  </div>

  <!-- View controls -->
  <div class="view-controls">
    <button class="btn btn-ghost btn-sm" id="today-btn">Today</button>
    <div class="cal-nav-group">
      <button class="btn-icon" id="prev-btn">‹</button>
      <span class="cal-period-label" id="period-label"></span>
      <button class="btn-icon" id="next-btn">›</button>
    </div>
    <div class="segmented">
      <button class="active" data-view="month">Month</button>
      <button data-view="week">Week</button>
      <button data-view="day">Day</button>
    </div>
    <button class="btn btn-primary btn-sm" id="add-event-btn" style="margin-left:auto">+ Add Event</button>
  </div>

  <!-- Calendar content -->
  <div id="cal-content"></div>

</main>

<!-- Event Modal -->
<div class="modal-backdrop" id="event-modal">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <div class="modal-title" id="event-modal-title">Add Event</div>
      <button class="btn-icon" onclick="closeEventModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="event-edit-id" />
      <input type="hidden" id="event-instance-date" />
      <input type="hidden" id="event-parent-id" />
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input class="input" id="event-title" placeholder="Event title" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="textarea" id="event-desc" placeholder="Optional details…" rows="2"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input class="input" type="date" id="event-date" />
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="input" id="event-location" placeholder="Optional" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Time</label>
          <input class="input" type="time" id="event-start" />
        </div>
        <div class="form-group">
          <label class="form-label">End Time</label>
          <input class="input" type="time" id="event-end" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Recurrence</label>
          <select class="select" id="event-recurrence">
            <option value="NONE">Does not repeat</option>
            <option value="DAILY">Daily</option>
            <option value="WEEKLY">Weekly</option>
            <option value="BIWEEKLY">Every 2 weeks</option>
            <option value="MONTHLY">Monthly</option>
          </select>
        </div>
        <div class="form-group" id="recurrence-end-group" style="display:none">
          <label class="form-label">Ends On</label>
          <input class="input" type="date" id="event-recurrence-end" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-picker" id="color-picker"></div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px">
        <input type="checkbox" id="event-important" style="width:16px;height:16px;accent-color:var(--indigo);cursor:pointer" />
        <label for="event-important" style="font-size:13px;cursor:pointer;color:var(--text-2)">Mark as important</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEventModal()">Cancel</button>
      <button class="btn btn-primary" id="event-save-btn">Add Event</button>
    </div>
  </div>
</div>

<!-- Event detail popup -->
<div class="modal-backdrop" id="event-detail-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div id="detail-color-dot" style="width:10px;height:10px;border-radius:50%;flex-shrink:0"></div>
      <div class="modal-title" id="detail-title" style="flex:1"></div>
      <button class="btn-icon" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<!-- Meeting notes modal -->
<div class="modal-backdrop" id="notes-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Meeting Notes</div>
      <button class="btn-icon" onclick="closeNotesModal()">✕</button>
    </div>
    <div class="modal-body">
      <textarea class="textarea" id="notes-content" placeholder="Add meeting notes…" rows="6"></textarea>
      <div class="note-save-indicator" id="notes-save-indicator" style="margin-top:6px;display:block"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNotesModal()">Close</button>
    </div>
  </div>
</div>

<!-- Recurring action context menu -->
<div class="context-menu" id="recur-menu" style="display:none"></div>

<nav id="mobile-bottom-nav">
  <ul>
    <li><a href="index.html"    data-page="dashboard"><span class="mobile-nav-icon">⊞</span>Dashboard</a></li>
    <li><a href="tasks.html"   data-page="tasks"><span class="mobile-nav-icon">☑</span>Tasks</a></li>
    <li><a href="calendar.html" data-page="calendar"><span class="mobile-nav-icon">📅</span>Calendar</a></li>
    <li><a href="notes.html"   data-page="notes"><span class="mobile-nav-icon">📝</span>Notes</a></li>
  </ul>
</nav>

<div id="toast-container"></div>
<script type="module" src="calendar.js"></script>
</body>
</html>
